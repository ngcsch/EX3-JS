<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Scramble Game</title>
  <style>
    body{
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        text-align: center;
        padding: 30px;
        background-color: #f0f0f0;
    }

    button{
        padding: 10px 20px;
        margin: 10px;
        font-size: 18px;
        cursor: pointer;
        
    }
        
  </style>
</head>
<body>
  <h1>Word Scramble Game</h1>

  <div>
    <p>Try to guess the word!</p>
    <h2 id="scrambledWord"></h2>
  </div>
  <div>
    <input type="text" id="guess" placeholder="Enter your guess here">
  </div>
  <br>

  <button id="checkAnswer"> Check Answer</button>
  <button id="newWord">New Word</button>
  <div id="result"></div>
  <img id="wordImage" src="" alt="Character Image" style="display: none; width: 300px; margin: 20px auto;">
  
 
</body>
<script>
    const words = ["Shinchan", "Doraemon", "Luffy", "Pikachu", "Saitama"];
  
    let currentWord = "";
    

    document.getElementById("checkAnswer").addEventListener("click", checkAnswer);
    document.getElementById("newWord").addEventListener("click", newWord);

    function newWord(){
    const randomIndex = Math.floor(Math.random() * words.length);
    currentWord = words[randomIndex];
    document.getElementById("scrambledWord").innerText = scrambleWord(currentWord);
    
    document.getElementById("wordImage").style.display = "none";
    document.getElementById("result").innerText = "";
}

    function scrambleWord(word){
    let scrambled = word.split("");
    
    for(let i = scrambled.length - 1; i > 0; i--){
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [scrambled[i], scrambled[randomIndex]] = [scrambled[randomIndex], scrambled[i]];
    }
    return scrambled.join("");
}
    

    function checkAnswer(){
    const userGuess = document.getElementById("guess").value;
    const resultDiv = document.getElementById("result");
    const wordImage = document.getElementById("wordImage");

    if(userGuess.toLowerCase() === currentWord.toLowerCase()){
        resultDiv.innerText = "Correct! Well done!";
        
        let imagePath = "";
        switch(currentWord.toLowerCase()) {
            case "shinchan":
                imagePath = "assets/shinchan.jpeg";
                break;
            case "doraemon":
                imagePath = "assets/doraemon.png";
                break;
            case "luffy":
                imagePath = "assets/luffy.webp";
                break;
            case "pikachu":
                imagePath = "assets/pikachu.jpeg";
                break;
            case "saitama":
                imagePath = "assets/saitama.webp";
                break;
        }
        
        wordImage.src = imagePath;
        wordImage.style.display = "block";
        
    } else {
        resultDiv.innerText = `Wrong! Try again!`;
        wordImage.style.display = "none";
    }
}

    

    newWord();




</script>
</html>
